<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投资组合</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="bg"></div>

  <!-- 登录遮罩 -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>投资组合</h2>
      <p class="login-hint">请登录后继续</p>
      <div class="login-field">
        <label for="loginUsername">用户名</label>
        <input id="loginUsername" type="text" placeholder="请输入用户名" />
      </div>
      <div class="login-field">
        <label for="loginPassword">密码</label>
        <input id="loginPassword" type="password" placeholder="请输入密码" />
      </div>
      <button id="loginBtn">登录</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <main id="appMain" class="app-shell" style="display:none;">
    <header class="topbar">
      <h1>投资组合</h1>
      <button id="logoutBtn" class="logout-btn">退出</button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="summary">总览</button>
      <button class="tab" data-tab="ibkr">盈透证券</button>
      <button class="tab" data-tab="longbridge">长桥</button>
    </nav>

    <section id="summary" class="panel active">
      <div id="summaryCards" class="cards"></div>
      <h2>资产趋势</h2>
      <div class="chart-wrap">
        <canvas id="snapshotChart"></canvas>
      </div>
      <h2>账户汇总</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>券商</th>
              <th>总市值</th>
              <th>未实现盈亏</th>
            </tr>
          </thead>
          <tbody id="summaryTableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="ibkr" class="panel">
      <div class="actions">
        <button id="syncIbkr">同步数据</button>
        <button id="refreshIbkr">刷新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代码</th>
              <th>数量</th>
              <th>均价</th>
              <th>市值</th>
              <th>未实现盈亏</th>
              <th>币种</th>
              <th>报告日期</th>
            </tr>
          </thead>
          <tbody id="ibkrTableBody"></tbody>
        </table>
      </div>
    </section>

    <section id="longbridge" class="panel">
      <div class="actions">
        <button id="syncLongbridge">同步数据</button>
        <button id="refreshLongbridge">刷新</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>代码</th>
              <th>市场</th>
              <th>数量</th>
              <th>均价</th>
              <th>最新价</th>
              <th>现值</th>
              <th>未实现盈亏</th>
              <th>盈亏比例</th>
              <th>币种</th>
              <th>快照时间</th>
            </tr>
          </thead>
          <tbody id="longbridgeTableBody"></tbody>
        </table>
      </div>
    </section>

    <p id="statusBar" class="status"></p>
  </main>
  <script src="./app.js"></script>
</body>
</html>
